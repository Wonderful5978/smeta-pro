name: IndexNow ping on deploy

# Срабатывает после каждого push в main → GitHub Pages деплоит → мы сразу сообщаем
# Bing/Яндексу что страницы обновились. Поисковики переиндексируют за часы, а не недели.
#
# Пингуем сразу 3 endpoint'а параллельно — для максимальной надёжности доставки:
#   1. api.indexnow.org    — общий «роутер» (раздаёт всем поисковикам стандарта)
#   2. yandex.com/indexnow — напрямую в Яндекс (приоритетная доставка для РФ)
#   3. www.bing.com/indexnow — напрямую в Bing (Microsoft Search)
# Один и тот же ключ работает для всех — это общий протокол.
on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      HOST: kpsmeta.ru
      KEY: 81e4ebeb0fe443f4b22b9a10cdbd7695
      KEY_LOCATION: https://kpsmeta.ru/81e4ebeb0fe443f4b22b9a10cdbd7695.txt
    steps:
      - name: Wait 90s for GitHub Pages to deploy
        run: sleep 90

      - name: Build payload
        run: |
          cat > payload.json <<'EOF'
          {
            "host": "kpsmeta.ru",
            "key": "81e4ebeb0fe443f4b22b9a10cdbd7695",
            "keyLocation": "https://kpsmeta.ru/81e4ebeb0fe443f4b22b9a10cdbd7695.txt",
            "urlList": [
              "https://kpsmeta.ru/",
              "https://kpsmeta.ru/demo/",
              "https://kpsmeta.ru/r2026-fkx8m9q/install.html"
            ]
          }
          EOF
          cat payload.json

      - name: Ping IndexNow (общий роутер)
        run: |
          echo "→ api.indexnow.org"
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @payload.json -w "  HTTP: %{http_code}\n"

      - name: Ping Yandex напрямую
        run: |
          echo "→ yandex.com/indexnow"
          curl -sS -X POST "https://yandex.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @payload.json -w "  HTTP: %{http_code}\n"

      - name: Ping Bing напрямую
        run: |
          echo "→ www.bing.com/indexnow"
          curl -sS -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @payload.json -w "  HTTP: %{http_code}\n"
